appId: com.autoembed.gui
productName: AutoEmbed
directories:
  output: dist
  buildResources: resources

files:
  - out/**/*
  - backend/**/*
  - "!backend/**/__pycache__"
  - "!backend/**/*.pyc"
  - "!backend/data/history.json"

win:
  target:
    - target: nsis
      arch:
        - x64
  artifactName: "${productName}-Setup-${version}.${ext}"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  artifactName: "${productName}-${version}-${arch}.${ext}"
  category: public.app-category.developer-tools

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

extraResources:
  - from: backend
    to: backend
    filter:
      - "**/*"
      - "!**/__pycache__"
      - "!**/*.pyc"
